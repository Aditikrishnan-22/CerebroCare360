{% extends "base.html" %}
{% block title %}Server Error — CerebroCare360{% endblock %}

{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;padding:2rem;">
    <div style="font-family:'Fraunces',serif;font-size:8rem;font-weight:600;
                background:linear-gradient(135deg,#dc2626,#7c3aed);
                -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                line-height:1;">500</div>
    <h2 style="font-family:'Fraunces',serif;font-size:1.6rem;margin-bottom:0.75rem;">
      Something Went Wrong
    </h2>
    <p style="color:var(--text-muted);font-size:15px;max-width:400px;margin:0 auto 2rem;">
      An unexpected error occurred on our end. Please try again in a moment.
    </p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="/" class="btn-cc-primary">
        <i class="bi bi-house"></i> Go Home
      </a>
      <a href="/scan/history" class="btn-cc-secondary">
        <i class="bi bi-clock-history"></i> My History
      </a>
    </div>
  </div>
</div>
{% endblock %}
